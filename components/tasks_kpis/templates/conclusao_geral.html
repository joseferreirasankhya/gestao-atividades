
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico de Rosca</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 84% 4.9%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 84% 4.9%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
            --radius: 0.5rem;
        }
        .dark {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --primary: 210 40% 98%;
            --primary-foreground: 222.2 47.4% 11.2%;
            --secondary: 217.2 32.6% 17.5%;
            --secondary-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --accent: 217.2 32.6% 17.5%;
            --accent-foreground: 210 40% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 210 40% 98%;
            --border: 217.2 32.6% 17.5%;
            --input: 217.2 32.6% 17.5%;
            --ring: 212.7 26.8% 83.9%;
        }
        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
        }
        #progress-ring {
            transition: stroke-dashoffset 0.5s ease-out;
        }
    </style>
</head>
<body class="w-full h-full">

    <div id="component-container" class="w-full h-full flex flex-col items-center justify-center p-4">
        <!-- O conteúdo dinâmico do gráfico será renderizado aqui -->
    </div>

    <script>
        const MITRA_UPDATE_EVENT_NAME = 'mitra-update-donutchart-component';

        function updateMitra() {
            console.log("Sinal de update para [Donut Chart] recebido. Disparando evento.");
            document.body.dispatchEvent(new CustomEvent(MITRA_UPDATE_EVENT_NAME));
        }

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('component-container');

            const renderError = (message) => {
                container.innerHTML = `
                    <div class="text-center p-4 bg-red-50 text-red-700 dark:bg-destructive/20 dark:text-destructive-foreground rounded-md w-full max-w-sm">
                        <h3 class="font-semibold">Erro no Componente</h3>
                        <p class="text-sm mt-1">${message}</p>
                    </div>
                `;
            };

            const renderLoading = () => {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-muted-foreground animate-pulse">
                        <svg class="w-12 h-12" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                        <p class="mt-2 text-sm">Carregando dados...</p>
                    </div>
                `;
            };

            const renderChart = (percentage, color, label) => {
                const cleanPercentage = Math.max(0, Math.min(100, parseFloat(percentage) || 0));
                const cleanColor = color || 'hsl(var(--primary))';
                const cleanLabel = label || '';

                const strokeWidth = 15; // Increased thickness for better visibility
                const radius = 50 - (strokeWidth / 2);
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (cleanPercentage / 100) * circumference;

                // Format with a comma for decimals, as in the reference image
                const formattedPercentage = cleanPercentage.toLocaleString('pt-BR', {
                    minimumFractionDigits: 1,
                    maximumFractionDigits: 1
                });

                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center w-full h-full">
                        <div 
                            class="relative w-48 h-48" 
                            role="progressbar" 
                            aria-valuenow="${cleanPercentage}" 
                            aria-valuemin="0" 
                            aria-valuemax="100"
                        >
                            <svg viewBox="0 0 100 100" class="w-full h-full">
                                <!-- Background Track -->
                                <circle 
                                    class="stroke-gray-200 dark:stroke-muted/50"
                                    cx="50" 
                                    cy="50" 
                                    r="${radius}" 
                                    fill="transparent" 
                                    stroke-width="${strokeWidth}">
                                </circle>
                                <!-- Progress Ring -->
                                <circle 
                                    id="progress-ring"
                                    cx="50" 
                                    cy="50" 
                                    r="${radius}" 
                                    fill="transparent" 
                                    stroke-linecap="round"
                                    stroke-width="${strokeWidth}"
                                    stroke="${cleanColor}"
                                    stroke-dasharray="${circumference}"
                                    stroke-dashoffset="${circumference}"
                                    transform="rotate(-90 50 50)">
                                </circle>
                            </svg>
                            <div class="absolute inset-0 flex items-center justify-center">
                                <span id="percentage-text" class="text-3xl font-bold text-foreground">${formattedPercentage}%</span>
                            </div>
                        </div>
                        <div id="summary-label" class="mt-4 text-center font-semibold text-foreground max-w-xs">
                            ${cleanLabel}
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    const progressRing = document.getElementById('progress-ring');
                    if (progressRing) {
                        progressRing.style.strokeDashoffset = offset;
                    }
                }, 100);
            };

            async function loadAndRender() {
                renderLoading();
                try {
                    const result = await queryMitra({ query: componentData.query, jdbcId: 1 });

                    if (!result || !result.data || result.data.length === 0) {
                        renderError("A consulta não retornou nenhum dado.");
                        return;
                    }

                    const headers = result.headers.map(h => (h && h.name ? h.name.toUpperCase() : ''));
                    const dataRow = result.data[0];

                    const percentIndex = headers.indexOf('PERCENTUAL');
                    const colorIndex = headers.indexOf('COR');

                    if (percentIndex === -1 || colorIndex === -1) {
                        renderError("A consulta deve retornar as colunas 'PERCENTUAL' e 'COR'.");
                        return;
                    }

                    const percentage = dataRow[percentIndex];
                    const color = dataRow[colorIndex];

                    renderChart(percentage, color, componentData.summaryLabel);

                } catch (error) {
                    console.error("Erro ao carregar dados do gráfico:", error);
                    renderError("Falha ao buscar os dados. Verifique a consulta e a conexão.");
                }
            }

            const initializeComponent = async () => {
                await loadAndRender();
            };

            document.body.addEventListener(MITRA_UPDATE_EVENT_NAME, loadAndRender);

            const waitForMitraAndInit = () => {
                const maxWaitTime = 5000;
                const intervalTime = 100;
                const startTime = Date.now();

                const checkInterval = setInterval(() => {
                    if (window.componentData && window.componentData.query && window.componentData.summaryLabel) {
                        clearInterval(checkInterval);
                        initializeComponent();
                    } else if (Date.now() - startTime > maxWaitTime) {
                        clearInterval(checkInterval);
                        const errorMessage = "Erro Crítico: As configurações (componentData.query e componentData.summaryLabel) não foram carregadas.";
                        console.error(errorMessage);
                        container.innerHTML = `<div class="p-8 text-center text-red-700 bg-red-50 h-full w-full flex items-center justify-center">${errorMessage}</div>`;
                    }
                }, intervalTime);
            };

            waitForMitraAndInit();
        });
    </script>
</body>
</html>

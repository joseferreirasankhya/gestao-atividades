<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de KPI - Logo Churn</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 84% 4.9%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 84% 4.9%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
            --radius: 0.5rem;
        }

        .dark {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --primary: 210 40% 98%;
            --primary-foreground: 222.2 47.4% 11.2%;
            --secondary: 217.2 32.6% 17.5%;
            --secondary-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --accent: 217.2 32.6% 17.5%;
            --accent-foreground: 210 40% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 210 40% 98%;
            --border: 217.2 32.6% 17.5%;
            --input: 217.2 32.6% 17.5%;
            --ring: 212.7 26.8% 83.9%;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
        }
    </style>
</head>

<body class="w-full h-full">
    <div id="kpi-card-container" class="w-full h-full flex items-center justify-center p-4">
        <div id="loading-state" class="text-center text-muted-foreground">
            <p>Carregando dados do card...</p>
        </div>
    </div>
    <script>
        const MITRA_UPDATE_EVENT_NAME = 'mitra-update-kpi-logochurn';

        const screenConfig = {
            infoModalId: 180,
            tooltipInfo: "Clientes suspensos com menos de 120 dias. Valor apresentado conforme data final informada,",
            linkUrl: "https://skw.sankhya.com.br/mge/system.jsp#app/YnIuY29tLnNhbmtoeWEuYW5hbHl0aWNzMi5uZXcuc2MudF8yMDI5My41LjExMg==",
            queryCard: `
                SELECT     
                    'MRR em Risco (Suspenso)' AS CARD_DESCRIPTION,     
                    CONCAT('R$ ', FORMAT(VALOR_MRR, 2, 'de_DE')) AS CARD_TITLE,     
                    '' AS CARD_SUFFIX,     
                    CASE         
                        WHEN VALOR_MRR = 0 THEN '#eaebf0'         
                        ELSE '#eaebf0'     
                    END AS CARD_BG_COLOR 
                FROM (     
                    SELECT SUM(MRR.VLR_MRR_EM_RISCO) AS VALOR_MRR       
                    FROM CC_1667 MRR            
                    INNER JOIN CAD_1006 PAR ON PAR.ID = MRR.ID_PARCEIRO           
                    INNER JOIN CAD_1007 UNI ON UNI.ID = MRR.ID_UNIDADE            
                    INNER JOIN CC_1669 DIA ON DIA.ID_PARCEIRO = MRR.ID_PARCEIRO AND DIA.ID_CALENDARIO = MRR.ID_CALENDARIO      
                    WHERE (MRR.ID_PARCEIRO IN (:ID_PARCEIRO) OR CONCAT(:ID_PARCEIRO) = 'Todos') 
                        AND DIA.TEMPO_EM_RISCO_DIAS <= 120        
                        AND (MRR.ID_UNIDADE IN (:ID_UNIDADE) OR CONCAT(:ID_UNIDADE) = 'Todos')        
                        AND (PAR.ID_SEGMENTO_PRINCIPAL IN (:ID_SEGMENTO_PRINCIPAL) OR CONCAT(:ID_SEGMENTO_PRINCIPAL) = 'Todos')       
                        AND (PAR.ID_SEGMENTACAO_ATUAL IN (:ID_CLASSIFICACAO.SEGMENTACAO_ATUAL) OR CONCAT(:ID_CLASSIFICACAO.SEGMENTACAO_ATUAL) = 'Todos')        
                        AND (UNI.ID_CS_MATRIZ IN (:ID_CS_MATRIZ) OR CONCAT(:ID_CS_MATRIZ) = 'Todos')        
                        AND (UNI.ID_TIPO_UNIDADE IN (:ID_TIPO_UNIDADE) OR CONCAT(:ID_TIPO_UNIDADE) = 'Todos')        
                        AND (PAR.ID_CONSULTOR_CS IN (:ID_USUARIO.CONSULTOR_CS) OR CONCAT(:ID_USUARIO.CONSULTOR_CS) = 'Todos')        
                        AND MRR.ID_CALENDARIO = (
                            SELECT MAX(C.ID)                                   
                            FROM CAD_1 C                                  
                            WHERE (C.ID IN (:ID_CALENDARIO) OR CONCAT(:ID_CALENDARIO) = 'Todos')                                    
                            AND C.ID <= DATE_FORMAT(NOW(), '%Y%m%d')                                    
                            AND C.ID LIKE '2026%01') 
                        ) CALC
            `
        }

        function updateMitra() {
            console.log("Sinal de update para [KPI Logo Churn] recebido. Disparando evento.");
            document.body.dispatchEvent(new CustomEvent(MITRA_UPDATE_EVENT_NAME));
        }

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('kpi-card-container');

            const renderError = (message) => {
                container.innerHTML = `
                    <div class="w-full h-full flex flex-col items-center justify-center bg-red-50 text-red-700 border border-red-200 rounded-lg p-4 text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-10 h-10 mb-2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <h3 class="font-semibold">Erro no Componente</h3>
                        <p class="text-sm">${message}</p>
                    </div>`;
            };

            const renderCard = (data) => {
                const { description, title, suffix, bgColor } = data;
                const finalBgColor = bgColor && /^#([0-9A-F]{3}){1,2}$/i.test(bgColor) ? bgColor : '#F1F5F9';
                const finalDescription = description || 'Descrição indisponível';
                const finalTitle = title || 'N/D';
                const finalSuffix = suffix || '';

                container.innerHTML = `
                    <div id="kpi-card" class="relative w-full h-full flex flex-col justify-center items-center text-center p-6 rounded-lg shadow-sm border border-border transition-colors duration-300" style="background-color: ${finalBgColor};">
                        <div id="info-tooltip" class="hidden absolute top-12 right-3 max-w-xs p-3 bg-gray-900 text-gray-100 text-xs rounded-lg shadow-lg z-10 border border-gray-700 text-left font-normal normal-case tracking-normal break-words"></div>
                        <div class="absolute top-3 right-3 flex items-center space-x-2">
                            <button id="info-button" title="Mais Informações" class="p-2 rounded-full hover:bg-black/10 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-foreground/70"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            </button>
                            <a id="link-button" href="#" target="_blank" rel="noopener noreferrer" title="Abrir Painel" class="p-2 rounded-full hover:bg-black/10 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-foreground/70"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
                            </a>
                        </div>
                        <div class="flex flex-col items-center justify-center">
                            <p id="card-description" class="text-sm font-medium text-muted-foreground tracking-wider">${finalDescription}</p>
                            <h2 id="card-value" class="text-base font-bold text-foreground mt-1">
                                ${finalTitle}<span class="text-base">${finalSuffix}</span>
                            </h2>
                        </div>
                    </div>
                `;
            };

            const setupEventListeners = () => {
                const infoButton = document.getElementById('info-button');
                const linkButton = document.getElementById('link-button');
                const infoTooltip = document.getElementById('info-tooltip');

                if (infoButton) {
                    if (screenConfig.infoModalId) {
                        const modalId = parseInt(screenConfig.infoModalId, 10);
                        if (!isNaN(modalId)) {
                            infoButton.addEventListener('click', () => { modalMitra({ id: modalId }); });
                        } else {
                            infoButton.disabled = true;
                            infoButton.title = "ID do Modal Inválido";
                            console.error("A variável 'infoModalId' não é um número válido.");
                        }
                    }
                    if (infoTooltip && screenConfig.tooltipInfo && screenConfig.tooltipInfo.trim() !== '') {
                        infoTooltip.textContent = screenConfig.tooltipInfo;
                        infoButton.addEventListener('mouseenter', () => { infoTooltip.classList.remove('hidden'); });
                        infoButton.addEventListener('mouseleave', () => { infoTooltip.classList.add('hidden'); });
                    }
                }

                if (linkButton && screenConfig.linkUrl) {
                    linkButton.href = screenConfig.linkUrl;
                } else if (linkButton) {
                    linkButton.style.display = 'none';
                }
            };

            const loadAndRenderData = async () => {
                try {
                    container.innerHTML = `<div id="loading-state" class="text-center text-muted-foreground"><p>Carregando...</p></div>`;
                    const result = await queryMitra({ query: screenConfig.queryCard });

                    if (!result || !result.data || result.data.length === 0) {
                        renderError("A consulta não retornou dados. Verifique a query configurada.");
                        return;
                    }

                    const headers = result.headers.map(h => h.name.toUpperCase());
                    const dataRow = result.data[0];
                    const colMap = {
                        DESCRIPTION: headers.indexOf('CARD_DESCRIPTION'),
                        TITLE: headers.indexOf('CARD_TITLE'),
                        SUFFIX: headers.indexOf('CARD_SUFFIX'),
                        BG_COLOR: headers.indexOf('CARD_BG_COLOR'),
                    };

                    if (Object.values(colMap).some(index => index === -1)) {
                        console.error("A query não retornou todas as colunas necessárias:", headers);
                        renderError("A query não retornou todas as colunas esperadas. Verifique o console para detalhes.");
                        return;
                    }

                    const cardData = {
                        description: dataRow[colMap.DESCRIPTION],
                        title: dataRow[colMap.TITLE],
                        suffix: dataRow[colMap.SUFFIX],
                        bgColor: dataRow[colMap.BG_COLOR]
                    };

                    renderCard(cardData);
                    setupEventListeners();

                } catch (error) {
                    console.error("Erro crítico ao carregar ou renderizar o card de KPI:", error);
                    renderError("Ocorreu uma falha ao buscar os dados. Verifique a configuração e o console para mais detalhes.");
                }
            };

            const initializeComponent = () => {
                document.body.addEventListener(MITRA_UPDATE_EVENT_NAME, loadAndRenderData);
                loadAndRenderData();
            };

            const waitForMitraAndInit = () => {
                const maxWaitTime = 5000;
                const intervalTime = 100;
                const startTime = Date.now();

                const checkInterval = setInterval(() => {
                    if (window.componentData && window.componentData.queryCard) {
                        clearInterval(checkInterval);
                        initializeComponent();
                    } else if (Date.now() - startTime > maxWaitTime) {
                        clearInterval(checkInterval);
                        console.error("Erro: As configurações do componente (componentData) não foram carregadas a tempo.");
                        document.body.innerHTML = `<div class="p-8 text-center text-red-700 bg-red-50 h-full flex items-center justify-center">Erro Crítico: As configurações do componente não foram carregadas da plataforma.</div>`;
                    }
                }, intervalTime);
            };

            waitForMitraAndInit();
        });
    </script>
</body>

</html>

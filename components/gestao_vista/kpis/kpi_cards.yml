nps:
  tooltipInfo: "O NPS, Net Promoter Score, é uma metodologia utilizada mundialmente para medir a lealdade dos clientes através de uma pergunta bem simples: Em uma escala de 0 a 10, o quanto você recomendaria a Sankhya para um amigo ou familiar? Onde de 0 até 6 detrator, 7 e 8 neutro e 9 a 10 promotor."
  dashboardUrl: "https://skw.sankhya.com.br/mge/system.jsp#app/YnIuY29tLnNhbmtoeWEubWVudS5hZGljaW9uYWwubnVEc2IuMTQzMS4x"
  queryRealizado: "SELECT    ROUND(     (SUM(CASE WHEN R.ID_ESCALA_NPS IN (9,10) THEN 1 ELSE 0 END)      - SUM(CASE WHEN R.ID_ESCALA_NPS <= 6 THEN 1 ELSE 0 END)     ) / NULLIF(COUNT(*),0) * 100.0   ,0) AS NPS FROM CC_1424 R JOIN CAD_8732 C ON C.ID = R.ID_CONTATO_PESQUISA_NPS WHERE   ( R.ID_CALENDARIO IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO) )   AND C.ID_PESQUISA_NPS_INVALIDA = 'N';"
  rankingActionId: "action:37"
  queryPrevisto: "WITH BASE_FILTRADA AS (      SELECT         cal.ID_CALENDARIO,         cal.ID_UNIDADE,         cal.METAS_CS__META_UNIDADE AS VALOR_META     FROM CC_1512 cal      INNER JOIN CAD_10931 cad         ON cad.ID = cal.ID_METAS_CS__GERENCIAMENTO_DE_METAS      WHERE cad.ID_METAS_CS = 2          /* FILTRO CALENDÁRIO */         AND (             cal.ID_CALENDARIO IN (:ID_CALENDARIO)             OR 'Todos' IN (:ID_CALENDARIO)         )          /* FILTRO UNIDADE */         AND (             cal.ID_UNIDADE IN (:ID_UNIDADE)             OR 'Todos' IN (:ID_UNIDADE)         )  ),  ULTIMO_MES AS (      SELECT         MAX(ID_CALENDARIO) AS ID_CALENDARIO_FINAL     FROM BASE_FILTRADA  ),  META_REAL AS (      SELECT         AVG(bf.VALOR_META) AS VALOR_META     FROM BASE_FILTRADA bf      INNER JOIN ULTIMO_MES um         ON um.ID_CALENDARIO_FINAL = bf.ID_CALENDARIO  ),  REGRA_FIXA AS (      SELECT         CASE              /* ===== 2026 ===== */             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2026' THEN                 CASE                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '01' AND '03' THEN 40                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '04' AND '06' THEN 42                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '07' AND '09' THEN 44                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '10' AND '12' THEN 48                 END              /* ===== 2025 ===== */             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2025' THEN                 CASE                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '01' AND '03' THEN 42                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '04' AND '06' THEN 42                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '07' AND '09' THEN 40                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '10' AND '12' THEN 44                 END              /* ===== 2024 ===== */             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2024' THEN 30              /* ===== 2023 ===== */             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2023' THEN 25          END AS VALOR_META      FROM ULTIMO_MES um  )  SELECT     CASE          /* Unidade não filtrada */         WHEN 'Todos' IN (:ID_UNIDADE)             THEN rf.VALOR_META          /* Unidade filtrada */         ELSE mr.VALOR_META      END AS NPS_RESULTADO  FROM REGRA_FIXA rf CROSS JOIN META_REAL mr;"
  queryAtingimento: "WITH BASE_FILTRADA AS (     SELECT         cal.ID_CALENDARIO,         cal.ID_UNIDADE,         cal.METAS_CS__META_UNIDADE AS VALOR_META     FROM CC_1512 cal     INNER JOIN CAD_10931 cad         ON cad.ID = cal.ID_METAS_CS__GERENCIAMENTO_DE_METAS     WHERE cad.ID_METAS_CS = 2       AND (cal.ID_CALENDARIO IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO))       AND (cal.ID_UNIDADE IN (:ID_UNIDADE) OR 'Todos' IN (:ID_UNIDADE)) ),  ULTIMO_MES AS (     SELECT MAX(ID_CALENDARIO) AS ID_CALENDARIO_FINAL     FROM BASE_FILTRADA ),  META_REAL AS (     SELECT AVG(bf.VALOR_META) AS VALOR_META     FROM BASE_FILTRADA bf     INNER JOIN ULTIMO_MES um         ON um.ID_CALENDARIO_FINAL = bf.ID_CALENDARIO ),  REGRA_FIXA AS (     SELECT         CASE             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2026' THEN                 CASE                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '01' AND '03' THEN 40                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '04' AND '06' THEN 42                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '07' AND '09' THEN 44                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '10' AND '12' THEN 48                 END             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2025' THEN                 CASE                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '01' AND '03' THEN 42                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '04' AND '06' THEN 42                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '07' AND '09' THEN 40                     WHEN SUBSTRING(um.ID_CALENDARIO_FINAL,5,2) BETWEEN '10' AND '12' THEN 44                 END             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2024' THEN 30             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2023' THEN 25         END AS VALOR_META     FROM ULTIMO_MES um ),  NPS_PREVISTO AS (     SELECT         CASE             WHEN 'Todos' IN (:ID_UNIDADE) THEN rf.VALOR_META             ELSE mr.VALOR_META         END AS VALOR     FROM REGRA_FIXA rf     CROSS JOIN META_REAL mr ),  NPS_REALIZADO AS (     SELECT         ROUND(             (                 SUM(CASE WHEN R.ID_ESCALA_NPS IN (9,10) THEN 1 ELSE 0 END)                 - SUM(CASE WHEN R.ID_ESCALA_NPS <= 6 THEN 1 ELSE 0 END)             ) / NULLIF(COUNT(*), 0) * 100.0         , 0) AS VALOR     FROM CC_1424 R     JOIN CAD_8732 C ON C.ID = R.ID_CONTATO_PESQUISA_NPS     WHERE (R.ID_CALENDARIO IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO))       AND C.ID_PESQUISA_NPS_INVALIDA = 'N' )  SELECT     ROUND(         nr.VALOR / NULLIF(np.VALOR, 0) * 100.0     , 0) AS PERCENTUAL_NPS FROM NPS_REALIZADO nr CROSS JOIN NPS_PREVISTO np;"
  title: "NPS"

mrr_churn:
  tooltipInfo: "MRR Churn é o valor da Receita Recorrente Mensal que a empresa deixa de receber no mês por perdas recorrentes reais e definitivas, como reduções definitivas, cancelamentos contratuais (inclusive após inadimplência, mesmo que unilaterais) e bonificações concedidas de forma definitiva."
  dashboardUrl: "https://skw.sankhya.com.br/mge/system.jsp#app/YnIuY29tLnNhbmtoeWEubWVudS5hZGljaW9uYWwubnVEc2IuMTQzMS4x"
  queryRealizado: "SELECT CONCAT(SUBSTR(CAST(ROUND(CAST(AVG(MRR_CHURN) AS DECIMAL(10,2)), 2) + 100 AS CHAR(10)), 3), '&#37;') AS MRR_CHURN FROM (       SELECT SUM(A.PERDAS)                                       AS PERDAS            , SUM(A.BASE_MRR)                                     AS BASE_MRR            , (SUM(A.PERDAS) / NULLIF(SUM(A.BASE_MRR), 0)) * 100 AS MRR_CHURN         FROM (                SELECT SUM(PER.VLR_PERDA_MRR_CHURN) AS PERDAS                    , 0                             AS BASE_MRR                    , PER.ID_CALENDARIO                 FROM CC_1671 PER                WHERE PER.ID_TIPO_DE_PERDA = 'DEFINITIVO '                  AND (PER.ID_CALENDARIO IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO))                  AND (PER.ID_PARCEIRO    IN (:ID_PARCEIRO)  OR 'Todos' IN (:ID_PARCEIRO))                  AND (EXISTS (                         SELECT 1 FROM CC_1609                          WHERE ID_PARCEIRO = PER.ID_PARCEIRO                            AND ID_USUARIOS = :ID_USUARIOS                       ) OR 'Todos' IN (:ID_USUARIOS))                GROUP BY PER.ID_CALENDARIO                UNION ALL                SELECT 0                             AS PERDAS                    , SUM(MRR.MRR_HISTORICO)        AS BASE_MRR                    , MRR.ID_CALENDARIO                 FROM CC_1333 MRR                WHERE (                        CASE                            WHEN MOD(MRR.ID_CALENDARIO, 10000) = 101                            THEN (MRR.ID_CALENDARIO - 10000) + 1100                            ELSE MRR.ID_CALENDARIO - 100                        END IN (:ID_CALENDARIO)                        OR 'Todos' IN (:ID_CALENDARIO)                      )                  AND (MRR.ID_PARCEIRO IN (:ID_PARCEIRO) OR 'Todos' IN (:ID_PARCEIRO))                  AND (EXISTS (                         SELECT 1 FROM CC_1609                          WHERE ID_PARCEIRO = MRR.ID_PARCEIRO                            AND ID_USUARIOS = :ID_USUARIOS                       ) OR 'Todos' IN (:ID_USUARIOS))                GROUP BY MRR.ID_CALENDARIO               ) A      ) X"
  rankingActionId: "action:37"
  queryPrevisto: "WITH ULTIMO_MES AS (     SELECT MAX(cal.ID_CALENDARIO) AS ID_CALENDARIO_FINAL     FROM CC_1512 cal     INNER JOIN CAD_10931 cad         ON cad.ID = cal.ID_METAS_CS__GERENCIAMENTO_DE_METAS     WHERE cad.ID_METAS_CS = 3       AND (cal.ID_CALENDARIO IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO))       AND (cal.ID_UNIDADE IN (:ID_UNIDADE) OR 'Todos' IN (:ID_UNIDADE)) ),  META_UNIDADE AS (     SELECT AVG(cal.METAS_CS__META_UNIDADE) AS VALOR_META     FROM CC_1512 cal     INNER JOIN CAD_10931 cad         ON cad.ID = cal.ID_METAS_CS__GERENCIAMENTO_DE_METAS     INNER JOIN ULTIMO_MES um         ON um.ID_CALENDARIO_FINAL = cal.ID_CALENDARIO     WHERE cad.ID_METAS_CS = 3       AND (cal.ID_UNIDADE IN (:ID_UNIDADE) OR 'Todos' IN (:ID_UNIDADE)) ),  REGRA_FIXA AS (     SELECT         CASE             WHEN LEFT(um.ID_CALENDARIO_FINAL, 4) = '2026' THEN 0.7             WHEN LEFT(um.ID_CALENDARIO_FINAL, 4) = '2025' THEN 0.8             ELSE 1         END AS VALOR_META     FROM ULTIMO_MES um ),  RESULTADO AS (     SELECT         CASE             WHEN 'Todos' IN (:ID_UNIDADE) THEN rf.VALOR_META             ELSE mu.VALOR_META         END AS VALOR_FINAL     FROM REGRA_FIXA rf     CROSS JOIN META_UNIDADE mu )  SELECT     CONCAT(         SUBSTR(             CAST(ROUND(CAST(VALOR_FINAL AS DECIMAL(10,2)), 2) + 100 AS CHAR(10)),         3),     '%') AS NPS_RESULTADO FROM RESULTADO"
  queryAtingimento: "/* =====================================================    PREVISTO (META MRR CHURN) ===================================================== */  WITH BASE_FILTRADA AS (      SELECT         cal.ID_CALENDARIO,         cal.ID_UNIDADE,         cal.METAS_CS__META_UNIDADE AS VALOR_META     FROM CC_1512 cal     INNER JOIN CAD_10931 cad         ON cad.ID = cal.ID_METAS_CS__GERENCIAMENTO_DE_METAS     WHERE cad.ID_METAS_CS = 3       AND (cal.ID_CALENDARIO IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO))       AND (cal.ID_UNIDADE IN (:ID_UNIDADE) OR 'Todos' IN (:ID_UNIDADE))  ),  ULTIMO_MES AS (      SELECT         MAX(ID_CALENDARIO) AS ID_CALENDARIO_FINAL     FROM CC_1512     WHERE (ID_CALENDARIO IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO))  ),  META_REAL AS (      SELECT         AVG(bf.VALOR_META) AS VALOR_META     FROM BASE_FILTRADA bf     INNER JOIN ULTIMO_MES um         ON um.ID_CALENDARIO_FINAL = bf.ID_CALENDARIO  ),  REGRA_FIXA AS (      SELECT         CASE             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2026' THEN 0.7             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2025' THEN 0.8             WHEN LEFT(um.ID_CALENDARIO_FINAL,4) = '2024' THEN 1         END AS VALOR_META     FROM ULTIMO_MES um  ),  PREVISTO AS (      SELECT         CASE             WHEN 'Todos' IN (:ID_UNIDADE)                 THEN rf.VALOR_META             ELSE COALESCE(mr.VALOR_META, rf.VALOR_META)         END AS PREVISTO     FROM REGRA_FIXA rf     CROSS JOIN META_REAL mr  ),  /* =====================================================    REALIZADO (MRR CHURN) ===================================================== */  REALIZADO AS (  SELECT     (SUM(A.PERDAS) / NULLIF(SUM(A.BASE_MRR),0)) * 100 AS REALIZADO FROM (          SELECT             SUM(PER.PERDAS_MRR) * -1 AS PERDAS,             0 AS BASE_MRR         FROM CC_1104 PER         WHERE PER.ID_TIPO_DE_PERDA = 'DEFINITIVO '           AND (PER.ID_CALENDARIO IN (:ID_CALENDARIO) OR CONCAT(:ID_CALENDARIO) = 'Todos')           AND (PER.ID_PARCEIRO IN (:ID_PARCEIRO) OR CONCAT(:ID_PARCEIRO) = 'Todos')           AND ID_CATEGORIA_MRR IN (15,14,2,1)           AND EXISTS (                 SELECT 1                 FROM CC_1609                 WHERE ID_PARCEIRO = PER.ID_PARCEIRO                   AND ID_USUARIOS = :ID_USUARIOS           )      UNION ALL          SELECT             SUM(CAN.VALOR_DE_CANCELAMENTO),             0         FROM CC_1173 CAN         WHERE CAN.ID_CANCELAMENTO_POR_LIMPEZA_DE_BASE <> 'S'           AND (CONCAT(LEFT(CAN.ID_CALENDARIO,6),'01') IN (:ID_CALENDARIO) OR CONCAT(:ID_CALENDARIO) = 'Todos')           AND (CAN.ID_PARCEIRO IN (:ID_PARCEIRO) OR CONCAT(:ID_PARCEIRO) = 'Todos')           AND EXISTS (                 SELECT 1                 FROM CC_1609                 WHERE ID_PARCEIRO = CAN.ID_PARCEIRO                   AND ID_USUARIOS = :ID_USUARIOS           )      UNION ALL          SELECT             0,             SUM(MRR.MRR_HISTORICO)         FROM CC_1333 MRR         WHERE (DATE_FORMAT(DATE_ADD(MRR.ID_CALENDARIO, INTERVAL 1 MONTH),'%Y%m%d') IN (:ID_CALENDARIO)                OR CONCAT(:ID_CALENDARIO) = 'Todos')           AND (MRR.ID_PARCEIRO IN (:ID_PARCEIRO) OR CONCAT(:ID_PARCEIRO) = 'Todos')           AND EXISTS (                 SELECT 1                 FROM CC_1609                 WHERE ID_PARCEIRO = MRR.ID_PARCEIRO                   AND ID_USUARIOS = :ID_USUARIOS           )  ) A  ),  /* =====================================================    ATINGIMENTO ===================================================== */  RESULTADO AS (  SELECT     (((p.PREVISTO - r.REALIZADO) / NULLIF(p.PREVISTO,0)) + 1) * 100 AS ATINGIMENTO FROM PREVISTO p CROSS JOIN REALIZADO r  )  SELECT     CONCAT(ROUND(ATINGIMENTO,2),'%') AS ATINGIMENTO_MRR_CHURN FROM RESULTADO;"
  title: "MRR Churn (%)"

ae:
  tooltipInfo: "Acompanhamento Evolutivo é a atividade focada em apoiar a evolução do cliente após a adoção, com atuação orientada por dados e foco na geração de valor. A abordagem varia conforme a segmentação: Premium e Enterprise com atuação mais consultiva e próxima, e Growth e Advocacy com acompanhamento orientado por dados e identificação de oportunidades de expansão.  O registro deve ser realizado na tela “CS - Acompanhamento Evolutivo (Novo)”, na aba Plano de Ação, clicando em + Gerar Plano de Ação e selecionando o tipo “Acompanhamento Evolutivo”."
  dashboardUrl: "https://skw.sankhya.com.br/mge/system.jsp#app/YnIuY29tLnNhbmtoeWEubWVudS5hZGljaW9uYWwubnVEc2IuMTQzMS4x"
  queryRealizado: "SELECT COUNT(DISTINCT t1.ID_PARCEIRO_CHAVE_LICENCA) AS QTD_ACOMPANHAMENTO_EVOLUTIVO FROM CAD_11048 t1 INNER JOIN CAD_11062 t2 ON t1.ID = t2.ID_HISTORICO_AE INNER JOIN CAD_CALENDARIO cal ON cal.ID = DATE_FORMAT(t2.DT_CONCLUSAO_PLANO_DE_ACAO, '%Y%m%d') LEFT JOIN CC_1325 t3 ON t3.ID_PARCEIRO = t1.ID_PARCEIRO_CHAVE_LICENCA     AND t3.ID_CALENDARIO = (         SELECT MAX(s.ID_CALENDARIO)         FROM CC_1325 s         WHERE s.ID_PARCEIRO = t1.ID_PARCEIRO_CHAVE_LICENCA         AND LEFT(CAST(s.ID_CALENDARIO AS CHAR), 6) IN (             DATE_FORMAT(t2.DT_CONCLUSAO_PLANO_DE_ACAO, '%Y%m'),             DATE_FORMAT(t2.DT_CONCLUSAO_PLANO_DE_ACAO - INTERVAL 1 MONTH, '%Y%m')         )     ) WHERE t2.ID_TIPO_DE_ACOMPANHAMENTO = 2   AND t2.DESCRICAO_PLANO_DE_ACAO_CONCLUIDO = 'Sim'   AND t2.DT_CONCLUSAO_PLANO_DE_ACAO IS NOT NULL   AND ( cal.ID IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO) )   AND ( t3.ID_UNIDADE IN (:ID_UNIDADE) OR 'Todos' IN (:ID_UNIDADE) );"
  rankingActionId: "action:37"
  queryPrevisto: "SELECT     SUM(cal.METAS_CS__META_UNIDADE) AS META_AE FROM CC_1512 cal INNER JOIN CAD_10931 cad     ON cad.ID = cal.ID_METAS_CS__GERENCIAMENTO_DE_METAS WHERE cad.ID_METAS_CS = 1 AND (     cal.ID_CALENDARIO IN (:ID_CALENDARIO)     OR 'Todos' IN (:ID_CALENDARIO) ) AND (     cal.ID_UNIDADE IN (:ID_UNIDADE)     OR 'Todos' IN (:ID_UNIDADE) );"
  queryAtingimento: "SELECT      ROUND(         (             SELECT COUNT(DISTINCT t1.ID_PARCEIRO_CHAVE_LICENCA)             FROM CAD_11048 t1             INNER JOIN CAD_11062 t2                  ON t1.ID = t2.ID_HISTORICO_AE             INNER JOIN CAD_CALENDARIO cal                  ON cal.ID = DATE_FORMAT(t2.DT_CONCLUSAO_PLANO_DE_ACAO, '%Y%m%d')             LEFT JOIN CC_1325 t3                  ON t3.ID_PARCEIRO = t1.ID_PARCEIRO_CHAVE_LICENCA                 AND t3.ID_CALENDARIO = (                     SELECT MAX(s.ID_CALENDARIO)                     FROM CC_1325 s                     WHERE s.ID_PARCEIRO = t1.ID_PARCEIRO_CHAVE_LICENCA                     AND LEFT(CAST(s.ID_CALENDARIO AS CHAR), 6) IN (                         DATE_FORMAT(t2.DT_CONCLUSAO_PLANO_DE_ACAO, '%Y%m'),                         DATE_FORMAT(t2.DT_CONCLUSAO_PLANO_DE_ACAO - INTERVAL 1 MONTH, '%Y%m')                     )                 )             WHERE t2.ID_TIPO_DE_ACOMPANHAMENTO = 2               AND t2.DESCRICAO_PLANO_DE_ACAO_CONCLUIDO = 'Sim'               AND t2.DT_CONCLUSAO_PLANO_DE_ACAO IS NOT NULL               AND (cal.ID IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO))               AND (t3.ID_UNIDADE IN (:ID_UNIDADE) OR 'Todos' IN (:ID_UNIDADE))         )         /         NULLIF(             (                 SELECT SUM(cal.METAS_CS__META_UNIDADE)                 FROM CC_1512 cal                 INNER JOIN CAD_10931 cad                      ON cad.ID = cal.ID_METAS_CS__GERENCIAMENTO_DE_METAS                 WHERE cad.ID_METAS_CS = 1                   AND (cal.ID_CALENDARIO IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO))                   AND (cal.ID_UNIDADE IN (:ID_UNIDADE) OR 'Todos' IN (:ID_UNIDADE))             ), 0         )         * 100, 0     ) AS PERCENTUAL_AE FROM DUAL"
  title: "AE"

clube_gestao:
  tooltipInfo: "Clube de Gestão é um programa de relacionamento para clientes com bons resultados e maturidade no uso da solução, que podem se tornar cases e compartilhar boas práticas. O cliente pode ser convidado pelo CS na etapa de Evolução, passando por pré-cadastro e avaliação antes de participar do programa. Clientes com esse perfil devem ser cadastrados pelo CS na tela “Cadastros de Clientes (Clube de Gestão)”."
  dashboardUrl: "https://skw.sankhya.com.br/mge/system.jsp#app/YnIuY29tLnNhbmtoeWEubWVudS5hZGljaW9uYWwubnVEc2IuMjI4OC4x"
  queryRealizado: "SELECT COUNT(*) AS REALIZADO FROM CC_1643 C INNER JOIN CAD_CALENDARIO cal ON cal.ID = DATE_FORMAT(C.CG_DT_APROVACAO_, '%Y%m%d') INNER JOIN CAD_1007 u ON u.ID = C.ID_UNIDADE WHERE C.CG_DT_APROVACAO_ IS NOT NULL   AND ( cal.ID IN (:ID_CALENDARIO) OR 'Todos' IN (:ID_CALENDARIO) )   AND ( u.ID IN (:ID_UNIDADE) OR 'Todos' IN (:ID_UNIDADE) )   AND ( u.ID_CS_MATRIZ IN (:ID_CS_MATRIZ) OR 'Todos' IN (:ID_CS_MATRIZ) )"
  rankingActionId: "action:37"
  queryPrevisto: "SELECT     SUM(cal.METAS_CS__META_UNIDADE) AS META_AE FROM CC_1512 cal INNER JOIN CAD_10931 cad     ON cad.ID = cal.ID_METAS_CS__GERENCIAMENTO_DE_METAS WHERE cad.ID_METAS_CS =8 AND (     cal.ID_CALENDARIO IN (:ID_CALENDARIO)     OR 'Todos' IN (:ID_CALENDARIO) ) AND (     cal.ID_UNIDADE IN (:ID_UNIDADE)     OR 'Todos' IN (:ID_UNIDADE) );"
  queryAtingimento: "SELECT      ROUND(         (             SELECT COUNT(DISTINCT ID_PARCEIRO)              FROM CC_1642         )          /          (             SELECT SUM(cal.METAS_CS__META_UNIDADE)             FROM CC_1512 cal             INNER JOIN CAD_10931 cad                  ON cad.ID = cal.ID_METAS_CS__GERENCIAMENTO_DE_METAS             WHERE cad.ID_METAS_CS = 8             AND (                 cal.ID_CALENDARIO IN (:ID_CALENDARIO)                 OR 'Todos' IN (:ID_CALENDARIO)             )             AND (                 cal.ID_UNIDADE IN (:ID_UNIDADE)                 OR 'Todos' IN (:ID_UNIDADE)             )         )          * 100, 0     ) AS PERCENTUAL FROM DUAL"
  title: "Clube de Gestão"
